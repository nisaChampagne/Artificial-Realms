name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: read
  pull-requests: read

jobs:
  release:
    name: Build and Release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if version is already released
        id: version
        shell: powershell
        run: |
          $tag = (node -p "require('./package.json').version")

          $tagExists = git ls-remote --tags origin "$tag" 2>$null | Select-String -Pattern "$tag" -Quiet
          if ($tagExists) {
            echo "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "exists=false" >> $env:GITHUB_OUTPUT
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $tag, Exists: $tagExists"

      - name: Setup Node.js
        if: steps.version.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        if: steps.version.outputs.exists == 'false'
        run: npm ci

      - name: Build and package for Windows
        if: steps.version.outputs.exists == 'false'
        shell: pwsh
        run: |
          Write-Host "Building for Windows"
          npm run make
          # Give a moment for file handles to close properly
          Start-Sleep -Seconds 3

      - name: Check for Windows artifacts
        if: steps.version.outputs.exists == 'false'
        id: check-win-artifact
        shell: powershell
        run: |
          $VERSION = "${{ steps.version.outputs.tag }}"
          Write-Host "Package version: $VERSION"

          Write-Host "Checking for Windows installer"
          $installerPath = "./out/make/squirrel.windows/x64/goodville-devops-tools-$VERSION Setup.exe"

          # Try to find the installer file if it's not in the expected location
          if (-not (Test-Path -Path $installerPath)) {
            Write-Host "Installer not found at expected path, searching for it..."
            $foundFiles = Get-ChildItem -Path "./out" -Recurse -File -Filter "*Setup.exe" | Select-Object -First 1

            if ($foundFiles) {
              $installerPath = $foundFiles.FullName
              Write-Host "Found installer at: $installerPath"
            } else {
              Write-Host "No installer files found"
              Get-ChildItem -Path "./out" -Recurse -File | ForEach-Object { $_.FullName }
            }
          }

          if (Test-Path -Path $installerPath) {
            echo "exists=true" >> $env:GITHUB_OUTPUT
            echo "setup_path=$installerPath" >> $env:GITHUB_OUTPUT
            Write-Host "Installer found at: $installerPath"
          } else {
            echo "exists=false" >> $env:GITHUB_OUTPUT
            Write-Host "Installer not found"
          }

      - name: Get PR release notes
        if: steps.version.outputs.exists == 'false'
        id: pr_notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_body=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].body // empty' 2>/dev/null || echo "")

          if [ -n "$pr_body" ]; then
            echo "body<<PREOF" >> "$GITHUB_OUTPUT"
            echo "$pr_body" >> "$GITHUB_OUTPUT"
            echo "PREOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.version.outputs.exists == 'false' && steps.check-win-artifact.outputs.exists == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ steps.pr_notes.outputs.body }}
        run: |
          tag="${{ steps.version.outputs.tag }}"

          git tag "$tag"
          git push origin "$tag"

          if [ -n "$PR_BODY" ]; then
            gh release create "$tag" \
              --title="$tag" \
              --draft \
              --notes "$PR_BODY" \
              "${{ steps.check-win-artifact.outputs.setup_path }}"
          else
            gh release create "$tag" \
              --title="$tag" \
              --draft \
              --generate-notes \
              "${{ steps.check-win-artifact.outputs.setup_path }}"
          fi
